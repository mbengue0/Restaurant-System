<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Category')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="container">
    <h1 class="mb-3"
        th:text="${mode == 'new' ? 'New Category' : 'Edit Category'}">Category</h1>

    <form method="post" class="card card-body" style="max-width: 28rem;"
          th:action="${mode == 'new'
              ? @{/admin/menu/categories}
              : @{/admin/menu/categories/{id}(id=${categoryId})}}">
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" name="name" required maxlength="50"
                   class="form-control" th:value="${name}">
        </div>
        <div class="mb-3">
            <label for="displayOrder" class="form-label">Display order</label>
            <input type="number" id="displayOrder" name="displayOrder" min="0" required
                   class="form-control" th:value="${displayOrder}">
            <div class="form-text">Lower numbers appear first.</div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">Save</button>
            <a th:href="@{/admin/menu}" class="btn btn-link">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
