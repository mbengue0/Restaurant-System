<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Menu item')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="container">
    <h1 class="mb-3"
        th:text="${mode == 'new' ? 'New Menu Item' : 'Edit Menu Item'}">Item</h1>

    <form method="post" class="card card-body" style="max-width: 32rem;"
          th:action="${mode == 'new'
              ? @{/admin/menu/items}
              : @{/admin/menu/items/{id}(id=${itemId})}}">
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" name="name" required maxlength="100"
                   class="form-control" th:value="${name}">
        </div>

        <div class="mb-3" th:if="${mode == 'new'}">
            <label for="description" class="form-label">
                Description <span class="text-muted small">(optional)</span>
            </label>
            <textarea id="description" name="description" rows="2"
                      class="form-control" th:text="${description}"></textarea>
        </div>

        <div class="mb-3">
            <label for="unitPrice" class="form-label">Unit price (CFA)</label>
            <input type="number" step="0.01" min="0.01" id="unitPrice" name="unitPrice"
                   required class="form-control" th:value="${unitPrice}">
        </div>

        <div class="mb-3" th:if="${mode == 'new'}">
            <label for="categoryId" class="form-label">Category</label>
            <select id="categoryId" name="categoryId" class="form-select" required>
                <option value="">— select —</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id.value}"
                        th:text="${c.name}"
                        th:selected="${preselectedCategoryId != null and preselectedCategoryId == c.id.value}">
                    cat
                </option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">Save</button>
            <a th:href="@{/admin/menu}" class="btn btn-link">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
