<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Tables')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="m-0">Manage Tables</h1>
        <a th:href="@{/admin/tables/new}" class="btn btn-primary">+ New table</a>
    </div>
    <p class="text-muted">
        UC02 — Admin-only. Active inactive tables are kept for history (FR8); only
        tables without an active order can be deactivated (BR1).
    </p>

    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>Table ID</th>
                <th class="text-end">Capacity</th>
                <th>Status</th>
                <th>Active</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${tables}"
                th:classappend="${t.active ? '' : 'text-muted'}">
                <td>
                    <code class="small"
                          th:text="${#strings.substring(t.id.value.toString(), 0, 8)}"
                          th:title="${t.id.value}">id</code>
                </td>
                <td class="text-end" th:text="${t.capacity}">0</td>
                <td>
                    <span class="badge"
                          th:classappend="${t.status.name() == 'AVAILABLE' ? 'bg-success' : 'bg-warning text-dark'}"
                          th:text="${t.status}">STATUS</span>
                </td>
                <td>
                    <span th:if="${t.active}" class="badge bg-success">active</span>
                    <span th:unless="${t.active}" class="badge bg-secondary">inactive</span>
                </td>
                <td>
                    <form th:if="${t.active}"
                          th:action="@{/admin/tables/{id}/deactivate(id=${t.id.value})}"
                          method="post" class="d-inline">
                        <button class="btn btn-sm btn-outline-danger" type="submit">
                            Deactivate
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(tables)}">
                <td colspan="5" class="text-center text-muted py-3">No tables yet.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <p class="mt-3">
        <a th:href="@{/dashboard}" class="btn btn-link">Back to dashboard</a>
    </p>
</main>
</body>
</html>
