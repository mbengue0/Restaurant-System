<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('New User')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="container">
    <h1 class="mb-3">New User</h1>

    <form th:action="@{/admin/users}" method="post"
          class="card card-body" style="max-width: 32rem;">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" required maxlength="50"
                   class="form-control" th:value="${username}">
        </div>
        <div class="mb-3">
            <label for="fullName" class="form-label">Full name</label>
            <input type="text" id="fullName" name="fullName" required maxlength="100"
                   class="form-control" th:value="${fullName}">
        </div>
        <div class="mb-3">
            <label for="role" class="form-label">Role</label>
            <select id="role" name="role" class="form-select" required>
                <option th:each="r : ${roles}"
                        th:value="${r.name()}"
                        th:text="${r}"
                        th:selected="${r.name() == selectedRole}">ROLE</option>
            </select>
        </div>
        <div class="alert alert-info small">
            A temporary password will be generated and shown to you once on the next page.
            Communicate it to the user; they must change it on first login (NFR-SEC-2).
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">Create</button>
            <a th:href="@{/admin/users}" class="btn btn-link">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
