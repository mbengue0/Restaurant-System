<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Users')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="m-0">Manage Users</h1>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">+ New user</a>
    </div>

    <div th:if="${#lists.isEmpty(users)}" class="alert alert-info">
        No users yet.
    </div>

    <table th:unless="${#lists.isEmpty(users)}" class="table align-middle">
        <thead>
            <tr>
                <th>Username</th>
                <th>Full name</th>
                <th>Role</th>
                <th>Status</th>
                <th>Last login</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${users}"
                th:classappend="${u.active ? '' : 'text-muted'}">
                <td><code th:text="${u.username}">name</code></td>
                <td th:text="${u.fullName}">full name</td>
                <td><span class="badge bg-secondary" th:text="${u.role}">ROLE</span></td>
                <td>
                    <span th:if="${u.active}" class="badge bg-success">active</span>
                    <span th:unless="${u.active}" class="badge bg-secondary">inactive</span>
                    <span th:if="${u.mustChangePassword}" class="badge bg-warning text-dark ms-1">
                        must change password
                    </span>
                </td>
                <td>
                    <small class="text-muted"
                           th:text="${u.lastLoginAt != null ? u.lastLoginAt : '—'}">—</small>
                </td>
                <td>
                    <a th:if="${u.active}"
                       th:href="@{/admin/users/{id}/edit(id=${u.id.value})}"
                       class="btn btn-sm btn-outline-secondary">Edit</a>
                    <form th:if="${u.active}"
                          th:action="@{/admin/users/{id}/reset-password(id=${u.id.value})}"
                          method="post" class="d-inline">
                        <button class="btn btn-sm btn-outline-warning" type="submit">
                            Reset password
                        </button>
                    </form>
                    <form th:if="${u.active}"
                          th:action="@{/admin/users/{id}/deactivate(id=${u.id.value})}"
                          method="post" class="d-inline">
                        <button class="btn btn-sm btn-outline-danger" type="submit">
                            Deactivate
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <p class="mt-3">
        <a th:href="@{/dashboard}" class="btn btn-link">Back to dashboard</a>
    </p>
</main>
</body>
</html>
