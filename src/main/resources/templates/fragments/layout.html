<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Restaurant</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<nav th:fragment="nav" class="navbar navbar-dark bg-dark mb-3">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">Restaurant</a>
        <div class="d-flex align-items-center text-light">
            <a sec:authorize="hasRole('WAITER')" th:href="@{/orders/active}"
               class="text-light text-decoration-none me-3">My Orders</a>
            <span class="me-3" sec:authentication="name">user</span>
            <span class="badge bg-secondary me-3"
                  sec:authentication="principal.authorities">role</span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button class="btn btn-outline-light btn-sm" type="submit">Log out</button>
            </form>
        </div>
    </div>
</nav>

<div th:fragment="flash" class="container">
    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-info" role="alert" th:text="${message}"></div>
</div>
</body>
</html>
