<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="container">
    <h1 class="mb-4">Dashboard</h1>
    <div class="row g-3">
        <div class="col-md-4">
            <a th:href="@{/tables}" class="card text-decoration-none h-100">
                <div class="card-body">
                    <h5 class="card-title">Tables</h5>
                    <p class="card-text text-muted">Seat customers, view orders.</p>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/kitchen}" class="card text-decoration-none h-100">
                <div class="card-body">
                    <h5 class="card-title">Kitchen</h5>
                    <p class="card-text text-muted">Submitted orders queue.</p>
                </div>
            </a>
        </div>
        <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/audit}" class="card text-decoration-none h-100">
                <div class="card-body">
                    <h5 class="card-title">Audit Log</h5>
                    <p class="card-text text-muted">System event history (UC20).</p>
                </div>
            </a>
        </div>
        <div class="col-md-4"
             sec:authorize="hasAnyRole('ADMIN', 'MANAGER')">
            <a th:href="@{/admin/menu}" class="card text-decoration-none h-100">
                <div class="card-body">
                    <h5 class="card-title">Manage Menu</h5>
                    <p class="card-text text-muted">Categories, items, prices (UC04–UC07).</p>
                </div>
            </a>
        </div>
        <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/users}" class="card text-decoration-none h-100">
                <div class="card-body">
                    <h5 class="card-title">Manage Users</h5>
                    <p class="card-text text-muted">Accounts, roles, password resets (UC17).</p>
                </div>
            </a>
        </div>
        <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/configuration}" class="card text-decoration-none h-100">
                <div class="card-body">
                    <h5 class="card-title">System Settings</h5>
                    <p class="card-text text-muted">Tax, charges, payment methods, policies (UC18).</p>
                </div>
            </a>
        </div>
    </div>
</main>
</body>
</html>
