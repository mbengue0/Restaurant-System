<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Record Payment')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="container" style="max-width: 520px;">
    <h1 class="mb-3">Record Payment</h1>
    <p class="text-muted">
        Bill: <strong th:text="${bill.billNumber}">BILL-…</strong><br>
        Total due: <strong th:text="${bill.total}">0</strong>
    </p>

    <form th:action="@{/payments}" method="post" class="card card-body">
        <input type="hidden" name="billId" th:value="${bill.id.value}">

        <div class="mb-3">
            <label for="amountPaid" class="form-label">Amount paid (CFA)</label>
            <input id="amountPaid" name="amountPaid" type="number" step="0.01" min="0"
                   th:value="${bill.total}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="method" class="form-label">Method</label>
            <select id="method" name="method" class="form-select" required>
                <option th:each="m : ${methods}" th:value="${m}" th:text="${m}">METHOD</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="reference" class="form-label">Reference (optional)</label>
            <input id="reference" name="reference" type="text" class="form-control">
        </div>

        <button class="btn btn-primary" type="submit">Confirm Payment</button>
    </form>
</main>
</body>
</html>
