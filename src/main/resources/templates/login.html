<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign in')}"></head>
<body class="bg-light">
<main class="container" style="max-width: 420px; margin-top: 6rem;">
    <h1 class="h3 mb-4 fw-normal text-center">Restaurant — Sign in</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

    <form th:action="@{/login}" method="post" class="card card-body">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input id="username" name="username" type="text" class="form-control"
                   autocomplete="username" required autofocus>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input id="password" name="password" type="password" class="form-control"
                   autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Sign in</button>
    </form>

    <p class="text-muted small mt-3">
        Demo accounts: <code>admin / admin123</code>, <code>manager / manager123</code>,
        <code>waiter / waiter123</code>, <code>kitchen / kitchen123</code>
    </p>
</main>
</body>
</html>
