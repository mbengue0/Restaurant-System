<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="container" style="max-width: 600px; margin-top: 2rem;">
    <div class="alert alert-danger">
        <h1 class="h4">Something went wrong</h1>
        <p th:text="${error}">An unexpected error occurred.</p>
        <p th:if="${status}">Status: <span th:text="${status}">500</span></p>
    </div>
    <a th:href="@{/}" class="btn btn-primary">Back to start</a>
</main>
</body>
</html>
