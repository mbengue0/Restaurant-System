<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cancel Order')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: flash}"></div>

<main class="container">
    <h1 class="mb-3">Cancel Order</h1>

    <div class="alert alert-warning">
        <strong>You are about to cancel this order.</strong>
        Per BR5, cancelling from <code>IN_PREPARATION</code>, <code>READY</code>,
        or <code>SERVED</code> requires a Manager. Cancellation does not
        automatically free the table.
    </div>

    <p class="text-muted small">
        Order id: <code th:text="${order.id.value}">id</code><br>
        Current state:
        <span class="badge bg-secondary" th:text="${order.state}">STATE</span><br>
        <span th:if="${table != null}">
            Table capacity: <span th:text="${table.capacity}">0</span>
        </span>
    </p>

    <form th:action="@{/orders/{id}/cancel(id=${order.id.value})}" method="post"
          class="card card-body" style="max-width: 36rem;">
        <div class="mb-3">
            <label for="reason" class="form-label">Reason</label>
            <select id="reason" name="reason" class="form-select" required>
                <option value="">— select a reason —</option>
                <option th:each="r : ${reasons}"
                        th:value="${r.name()}"
                        th:text="${r}">REASON</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="note" class="form-label">
                Note <span class="text-muted">(optional)</span>
            </label>
            <textarea id="note" name="note" rows="3" maxlength="500"
                      class="form-control"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-danger" type="submit">Confirm Cancellation</button>
            <a th:href="@{/orders/{id}/edit(id=${order.id.value})}"
               class="btn btn-link">Back</a>
        </div>
    </form>
</main>
</body>
</html>
