# Production profile — activated via SPRING_PROFILES_ACTIVE=prod
#
# Datasource resolution order:
#   1. If SPRING_DATASOURCE_URL is set (Docker Compose), it is used as-is.
#   2. Otherwise the JDBC URL is assembled from DB_HOST / DB_PORT / DB_NAME
#      (Render injects these from the managed Postgres). Each has a localhost
#      default so the app still starts in a bare environment.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:restaurant_system}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Render (and most PaaS) inject the port to listen on via $PORT.
# Falls back to 8080 for Docker Compose / local prod runs.
server.port=${PORT:8080}

# Thymeleaf — cache compiled templates in prod
spring.thymeleaf.cache=true

# JPA / Hibernate — quieter logs, dialect is auto-detected
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# ddl-auto=update lets the schema evolve with the entity model.
# A real production system would replace this with Flyway/Liquibase
# migrations, but that is out of scope for this project (see CLAUDE.md
# "Tech stack — fixed, do not change").
spring.jpa.hibernate.ddl-auto=update

# Tighten log levels
logging.level.org.hibernate=WARN
logging.level.org.springframework=INFO
