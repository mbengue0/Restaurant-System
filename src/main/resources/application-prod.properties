# Production profile — activated via SPRING_PROFILES_ACTIVE=prod
#
# Datasource credentials are NOT set here. They are taken from the
# environment (SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME /
# SPRING_DATASOURCE_PASSWORD) — Spring Boot binds those automatically.

server.port=8080

# Thymeleaf — cache compiled templates in prod
spring.thymeleaf.cache=true

# JPA / Hibernate — quieter logs, dialect is auto-detected
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# ddl-auto=update lets the schema evolve with the entity model.
# A real production system would replace this with Flyway/Liquibase
# migrations, but that is out of scope for this project (see CLAUDE.md
# "Tech stack — fixed, do not change").
spring.jpa.hibernate.ddl-auto=update

# Tighten log levels
logging.level.org.hibernate=WARN
logging.level.org.springframework=INFO
